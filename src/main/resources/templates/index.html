<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>InsightDesk</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 760px;
            margin: 50px auto;
            padding: 0 20px;
            background-color: #f6f8fb;
        }

        .container {
            background: pink;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        p {
            color: #4b5563;
        }

        label {
            display: block;
            margin-top: 18px;
            margin-bottom: 6px;
            font-weight: bold;
            color: #374151;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        button {
            margin-top: 22px;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>InsightDesk version1</h1>
    <p>Share your feedback or support request with us.</p>

    <form action="/feedback" method="post">

        <label for="title">Title *</label>
        <input
                type="text"
                id="title"
                name="title"
                placeholder="Briefly describe your issue"
                required
        >

        <label for="body">Description *</label>
        <textarea
                id="body"
                name="body"
                placeholder="Explain the issue or feedback in detail"
                required
        ></textarea>

        <label for="contactEmail">Contact Email (optional)</label>
        <input
                type="email"
                id="contactEmail"
                name="contactEmail"
                placeholder="example@email.com"
        >

        <button type="submit">Send Feedback</button>
    </form>
</div>
</body>
</html>
