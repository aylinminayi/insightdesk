services:
  postgres:
    image: postgres:16
    container_name: insightdesk-postgres
    environment:
      POSTGRES_DB: insightdesk
      POSTGRES_USER: insightdesk_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: insightdesk-redis
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: insightdesk-api:week2
    container_name: insightdesk-api
    depends_on:
      - postgres
      - redis
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/insightdesk
      SPRING_DATASOURCE_USERNAME: insightdesk_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_WORKER_ENABLED: "false"
    ports:
      - "8080:8080"

  worker:
    image: insightdesk-api:week2
    container_name: insightdesk-worker
    depends_on:
      - postgres
      - redis
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/insightdesk
      SPRING_DATASOURCE_USERNAME: insightdesk_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_WORKER_ENABLED: "true"

volumes:
  postgres_data: